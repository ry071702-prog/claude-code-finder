<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ページが見つかりません ｜ Claude Code 逆引き辞典</title>
<meta name="robots" content="noindex,follow">
<meta name="theme-color" content="#f5f1ea" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#15120e" media="(prefers-color-scheme: dark)">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script>(function(){try{var t=localStorage.getItem('ccf-theme');if(!t)t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.dataset.theme=t;}catch(e){}})();</script>
<style>
  .nf-wrap{min-height:100dvh;display:grid;place-items:center;padding:40px 20px;text-align:center}
  .nf-inner{max-width:520px;display:grid;gap:18px;justify-items:center}
  .nf-mark{font-family:var(--mono);font-size:2rem;font-weight:700;color:var(--accent);background:var(--accent-soft);
    border:1px solid var(--accent-line);border-radius:16px;padding:14px 18px}
  .nf-code{font-family:var(--mono);font-size:.8rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
  .nf-title{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:850;letter-spacing:-.03em;color:var(--ink);line-height:1.1}
  .nf-sub{color:var(--text2);font-size:1rem;line-height:1.7}
  .nf-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:6px}
  .nf-btn{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:.92rem;padding:12px 20px;border-radius:12px;text-decoration:none}
  .nf-btn.primary{background:var(--accent);color:#fff}
  .nf-btn.ghost{border:1.5px solid var(--border2);color:var(--text)}
  .nf-btn:hover{text-decoration:none;transform:translateY(-1px)}
</style>
</head>
<body>
<main class="nf-wrap">
  <div class="nf-inner">
    <span class="nf-mark" aria-hidden="true">❯_</span>
    <p class="nf-code">Error 404</p>
    <h1 class="nf-title">そのページは見つかりませんでした</h1>
    <p class="nf-sub">URL が変わったか、ページが無いようです。目的から機能を逆引きするか、トップに戻ってください。</p>
    <div class="nf-actions">
      <a class="nf-btn primary" href="/">逆引きトップへ</a>
      <a class="nf-btn ghost" href="/guide">ガイドを見る</a>
    </div>
  </div>
</main>
</body>
</html>
