name: Ingest skills & changelog

on:
  schedule:
    - cron: "0 22 * * 1"   # 毎週 月22:00 UTC = 火 07:00 JST
  workflow_dispatch:
    inputs:
      limit:
        description: "取り込み最大件数"
        default: "120"

permissions:
  contents: write

concurrency:
  group: ingest-skills
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      # パーサ(CHANGELOG/SKILL.md frontmatter)の回帰を fetch 前に検知。壊れていれば取り込みを止める。
      - name: Test parsers
        run: python -m pytest tests/ -q || python tests/test_parsers.py

      # 非LLM。GITHUB_TOKEN で GitHub API を叩く（star/SKILL.md 取得）。
      - name: Fetch skills (non-LLM)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_skills.py --limit "${{ github.event.inputs.limit || '120' }}"

      - name: Build site data
        run: python scripts/build_data.py

      # 非LLM。公式 anthropics/claude-code の CHANGELOG.md を取得して更新ページへ反映。
      - name: Fetch official changelog (non-LLM)
        run: python scripts/fetch_updates.py --limit 8

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # プラグイン同梱の逆引きデータ(MCP lookup 用)も同期
      - name: Build plugin/MCP data
        run: node scripts/build_plugin_data.mjs

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/skills/skills.jsonl site/js/data-skills.js site/js/data-changelog.js plugin/mcp/data.json
          if git diff --cached --quiet; then
            echo "変更なし（スキップ）"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: refresh community skills & changelog ($(date -u +%Y-%m-%d))"
            # 併走 push との競合に備え rebase してから push（失敗時は1回リトライ）
            git pull --rebase --autostash origin main || true
            git push || { git pull --rebase --autostash origin main && git push; }
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # 重要: GITHUB_TOKEN での push は deploy.yml の on:push を発火させない（GitHub仕様）ため、
      # ingest 自身がデプロイまで行う。これが無いと「データは更新されるが本番に反映されない」状態になる。
      - name: Deploy refreshed data to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true' && env.HAS_TOKEN == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy
            --project-name=claude-code-finder
            --branch=main
            --commit-hash=${{ github.sha }}
            --commit-message=ci-ingest

      # 非LLM。新しいバージョン/Skillが有る時だけ投稿する（毎週おなじ内容は流さない）。
      # 本番へ反映した後に通知するため、必ず deploy の後ろに置く。
      # SLACK_WEBHOOK_URL 未設定なら投稿せず終了する（state も進めないので後から設定しても取りこぼさない）。
      - name: Notify Slack (non-LLM)
        if: steps.commit.outputs.changed == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/notify_slack.py

      - name: Persist notify state
        if: steps.commit.outputs.changed == 'true'
        run: |
          git add data/notify_state.json
          if git diff --cached --quiet; then
            echo "通知状態に変更なし"
          else
            git commit -m "data: notify state ($(date -u +%Y-%m-%d))"
            git pull --rebase --autostash origin main || true
            git push || { git pull --rebase --autostash origin main && git push; }
          fi
